```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesiones — AIR</title>
    <style>
        /* ── Variables ── */
        :root {
            --color-primario   : #003366;
            --color-acento     : #005fa3;
            --color-peligro    : #c0392b;
            --color-exito      : #1e7e34;
            --color-advertencia: #856404;
            --bg-advertencia   : #fff3cd;
            --bg-peligro       : #f8d7da;
            --bg-exito         : #d4edda;
            --radio            : 6px;
            --sombra           : 0 2px 12px rgba(0,0,0,.12);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f4f6f9; 
            color: #222; 
            margin: 0; 
        }

        /* ── Layout ── */
        .page-header {
            background: var(--color-primario); 
            color: #fff;
            padding: 28px 28px 24px; 
            text-align: center;
        }
        .page-header h1 { 
            margin: 0 0 8px; 
            font-size: 1.8rem; 
            font-weight: 600; 
        }
        .page-header .subtitulo { 
            margin: 0; 
            font-size: .95rem; 
            opacity: .95; 
        }
        .page-header .badge-modulo {
            background: rgba(255,255,255,.18); 
            border-radius: 20px;
            padding: 4px 14px; 
            font-size: .8rem; 
            letter-spacing: .4px;
            display: inline-block;
            margin-top: 12px;
        }
        
        .contenedor { 
            max-width: 1100px; 
            margin: 28px auto; 
            padding: 0 20px; 
        }

        /* ── Encabezado de Sección ── */
        .encabezado-seccion {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border-radius: var(--radio);
            padding: 24px;
            box-shadow: var(--sombra);
            border: 1px solid rgba(0,0,0,.05);
            margin-bottom: 24px;
        }
        .encabezado-seccion h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--color-primario);
            font-weight: 600;
        }

        /* ── Cards ── */
        .card {
            background: #fff; 
            border-radius: var(--radio); 
            padding: 24px;
            box-shadow: var(--sombra);
            border: 1px solid rgba(0,0,0,.05);
            margin-bottom: 24px;
        }
        .card h2 {
            margin: 0 0 20px;
            font-size: 1.15rem;
            color: var(--color-primario);
            font-weight: 600;
        }

        /* ── Formularios ── */
        .campo {
            margin-bottom: 20px;
        }
        .campo label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #555;
            font-size: .92rem;
        }
        .campo input,
        .campo select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: var(--radio);
            font-size: 1rem;
            background: #fff;
            transition: all .15s;
            font-family: inherit;
            box-sizing: border-box;
        }
        .campo input:focus,
        .campo select:focus {
            outline: none;
            border-color: var(--color-acento);
            box-shadow: 0 0 0 3px rgba(0,95,163,.1);
        }

        .fila-dos-columnas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* ── Acciones Formulario ── */
        .acciones-formulario {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* ── Botones ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px; 
            border-radius: var(--radio); 
            border: none; 
            cursor: pointer; 
            font-size: .9rem; 
            font-weight: 600; 
            text-decoration: none;
            transition: all .15s;
        }
        .btn:hover { 
            opacity: .9;
            transform: translateY(-1px);
        }
        .btn-primario { 
            background: var(--color-acento);  
            color: #fff; 
        }
        .btn-secundario {
            background: #6c757d;
            color: #fff;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: .85rem;
        }

        /* ── Alertas ── */
        .alerta {
            border-radius: var(--radio);
            padding: 16px 20px;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alerta-error {
            background: var(--bg-peligro);
            color: var(--color-peligro);
            border: 1px solid rgba(192,57,43,.2);
        }
        .alerta-ok {
            background: var(--bg-exito);
            color: var(--color-exito);
            border: 1px solid rgba(30,126,52,.2);
        }

        /* ── Tablas ── */
        table {
            width: 100%;
            background: #fff;
            border-radius: var(--radio);
            overflow: hidden;
            box-shadow: var(--sombra);
            border: 1px solid rgba(0,0,0,.05);
            border-collapse: separate;
            border-spacing: 0;
        }
        thead {
            background: var(--color-primario);
            color: #fff;
        }
        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }
        th {
            font-weight: 600;
            font-size: .95rem;
            letter-spacing: .3px;
            text-transform: uppercase;
        }
        tbody tr:hover {
            background: rgba(0,95,163,.04);
        }
        tbody tr:last-child td {
            border-bottom: none;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 24px 0;
            color: #666;
            font-size: .88rem;
            border-top: 1px solid #e9ecef;
            margin-top: 44px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .encabezado-seccion {
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
                text-align: center;
            }
            .fila-dos-columnas {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .acciones-formulario {
                flex-direction: column;
            }
            table {
                font-size: .9rem;
            }
            th, td {
                padding: 12px 12px;
            }
            .contenedor { padding: 0 16px; }
            .page-header { padding: 24px 20px 20px; }
            .page-header h1 { font-size: 1.5rem; }
            .card { padding: 20px; }
        }

        @media (max-width: 480px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            tr {
                border: 1px solid #e9ecef;
                margin-bottom: 12px;
                border-radius: var(--radio);
                padding: 12px;
                background: #fff;
                box-shadow: var(--sombra);
            }
            td {
                border: none;
                position: relative;
                padding-left: 50%;
                padding-top: 8px;
                padding-bottom: 8px;
            }
            td:before {
                content: attr(data-label) ": ";
                position: absolute;
                left: 12px;
                width: 45%;
                font-weight: 600;
                color: var(--color-primario);
            }
        }
    </style>
</head>
<body>

<!-- ── Encabezado ── -->
<header class="page-header">
    <h1>Sesiones de la AIR</h1>
    <p class="subtitulo">Gestión completa de sesiones plenarias, agendas y control de deliberaciones</p>
    <span class="badge-modulo">Sesiones</span>
</header>

<main class="contenedor">
    <div class="encabezado-seccion">
        <h1>Lista de sesiones</h1>
        <button class="btn btn-primario" onclick="mostrarFormSesion()">+ Nueva Sesión</button>
    </div>

    <!-- Formulario nueva sesión (oculto por defecto) -->
    <div id="form-nueva-sesion" style="display:none" class="card">
        <h2>Registrar nueva sesión</h2>
        <div class="campo">
            <label>Número de sesión *</label>
            <input type="text" id="numero-sesion" placeholder="ej: AIR-110-2024">
        </div>
        <div class="campo">
            <label>Fecha *</label>
            <input type="date" id="fecha-sesion">
        </div>
        <div class="fila-dos-columnas">
            <div class="campo">
                <label>Tipo de sesión *</label>
                <select id="tipo-sesion">
                    <option value="">Seleccione...</option>
                </select>
            </div>
            <div class="campo">
                <label>Modalidad *</label>
                <select id="tipo-modalidad">
                    <option value="">Seleccione...</option>
                </select>
            </div>
        </div>
        <div class="campo">
            <label>Quórum requerido</label>
            <input type="number" id="quorum" placeholder="ej: 40" min="1">
        </div>
        <div class="acciones-formulario">
            <button class="btn btn-secundario" onclick="ocultarFormSesion()">Cancelar</button>
            <button class="btn btn-primario" onclick="guardarSesion()">Guardar sesión</button>
        </div>
    </div>

    <div id="mensaje-error" class="alerta alerta-error" style="display:none"></div>
    <div id="mensaje-ok"    class="alerta alerta-ok"    style="display:none"></div>

    <table>
        <thead>
            <tr>
                <th>N° Sesión</th>
                <th>Fecha</th>
                <th>Tipo</th>
                <th>Modalidad</th>
                <th>Puntos agenda</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            <tr><td colspan="6">Cargando...</td></tr>
        </tbody>
    </table>

    <div class="footer">
        Gestión de Sesiones — Sistema AIR
    </div>
</main>

<script>
    const token = localStorage.getItem('token');

    async function cargar() {
        const [sesiones, cats] = await Promise.all([
            fetch('/sesiones', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()),
            fetch('/sesiones/catalogos', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json())
        ]);

        // Llenar selects
        cats.tipos.forEach(t => document.getElementById('tipo-sesion').add(new Option(t.nombre, t.id_tipo_sesion)));
        cats.modalidades.forEach(m => document.getElementById('tipo-modalidad').add(new Option(m.nombre, m.id_tipo_modalidad)));

        renderTabla(sesiones);
    }

    function renderTabla(lista) {
        document.getElementById('cuerpo-tabla').innerHTML = lista.map(s => `
            <tr>
                <td data-label="N° Sesión">${s.numero_sesion}</td>
                <td data-label="Fecha">${new Date(s.fecha).toLocaleDateString('es-CR')}</td>
                <td data-label="Tipo">${s.tipo_sesion}</td>
                <td data-label="Modalidad">${s.tipo_modalidad}</td>
                <td data-label="Puntos agenda">${s.total_puntos}</td>
                <td data-label="Acciones"><a href="/sesiones/${s.id_sesion}" class="btn btn-sm btn-secundario">Ver agenda</a></td>
            </tr>
        `).join('');
    }

    async function guardarSesion() {
        const body = {
            numero_sesion:    document.getElementById('numero-sesion').value,
            fecha:            document.getElementById('fecha-sesion').value,
            id_tipo_sesion:   document.getElementById('tipo-sesion').value,
            id_tipo_modalidad: document.getElementById('tipo-modalidad').value,
            quorum_requerido: document.getElementById('quorum').value || 0
        };

        const res = await fetch('/sesiones', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) { 
            document.getElementById('mensaje-error').textContent = data.error; 
            document.getElementById('mensaje-error').style.display = 'block'; 
            return; 
        }
        document.getElementById('mensaje-ok').textContent = 'Sesión creada.';
        document.getElementById('mensaje-ok').style.display = 'block';
        ocultarFormSesion();
        cargar();
    }

    function mostrarFormSesion() { 
        document.getElementById('form-nueva-sesion').style.display = 'block'; 
    }
    function ocultarFormSesion() { 
        document.getElementById('form-nueva-sesion').style.display = 'none'; 
    }

    cargar();
</script>

</body>
</html>
