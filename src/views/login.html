<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — AIR</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-profundo : #001f4d;
            --azul-medio    : #003366;
            --azul-acento   : #005fa3;
            --azul-claro    : #e8f0fb;
            --dorado        : #c9a84c;
            --blanco        : #ffffff;
            --gris-suave    : #f4f6f9;
            --gris-texto    : #555e6d;
            --error         : #c0392b;
            --radio         : 8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--azul-profundo);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo decorativo */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,95,163,.35) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(201,168,76,.12) 0%, transparent 55%),
                linear-gradient(160deg, #001f4d 0%, #002a5e 50%, #001535 100%);
            z-index: 0;
        }

        /* Líneas decorativas */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,.025) 0px,
                    rgba(255,255,255,.025) 1px,
                    transparent 1px,
                    transparent 80px
                ),
                repeating-linear-gradient(
                    0deg,
                    rgba(255,255,255,.025) 0px,
                    rgba(255,255,255,.025) 1px,
                    transparent 1px,
                    transparent 80px
                );
            z-index: 0;
        }

        /* Círculos flotantes */
        .decoracion {
            position: fixed;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        .decoracion-1 {
            width: 500px; height: 500px;
            top: -150px; right: -100px;
            background: radial-gradient(circle, rgba(0,95,163,.2) 0%, transparent 70%);
            animation: flotar 8s ease-in-out infinite;
        }
        .decoracion-2 {
            width: 300px; height: 300px;
            bottom: -80px; left: -60px;
            background: radial-gradient(circle, rgba(201,168,76,.15) 0%, transparent 70%);
            animation: flotar 10s ease-in-out infinite reverse;
        }
        @keyframes flotar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Tarjeta principal */
        .tarjeta {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,.97);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 48px 44px;
            box-shadow:
                0 30px 80px rgba(0,0,0,.4),
                0 0 0 1px rgba(255,255,255,.08);
            animation: aparecer .5s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(30px) scale(.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo / encabezado */
        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icono {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--azul-medio), var(--azul-acento));
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(0,51,102,.25);
        }
        .logo-icono svg {
            width: 28px; height: 28px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .logo-area h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem;
            color: var(--azul-profundo);
            letter-spacing: -.5px;
            margin-bottom: 4px;
        }
        .logo-area .subtitulo {
            font-size: .82rem;
            color: var(--gris-texto);
            font-weight: 400;
            letter-spacing: .2px;
        }

        /* Separador dorado */
        .separador {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--dorado), transparent);
            margin: 12px auto 0;
            border-radius: 2px;
        }

        /* Campos */
        .grupo {
            margin-bottom: 20px;
        }
        .grupo label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            color: var(--azul-medio);
            margin-bottom: 8px;
            letter-spacing: .4px;
            text-transform: uppercase;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px; height: 16px;
            stroke: #aab;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
            transition: stroke .2s;
        }
        .grupo input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 2px solid #e1e5ed;
            border-radius: var(--radio);
            font-size: .95rem;
            font-family: 'DM Sans', sans-serif;
            color: #1a1a2e;
            background: var(--gris-suave);
            transition: all .2s;
            outline: none;
        }
        .grupo input:focus {
            border-color: var(--azul-acento);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0,95,163,.1);
        }
        .grupo input:focus + svg,
        .input-wrap:focus-within svg {
            stroke: var(--azul-acento);
        }

        /* Toggle contraseña */
        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .toggle-pass svg {
            position: static;
            transform: none;
            width: 17px; height: 17px;
        }

        /* Error */
        .mensaje-error {
            display: none;
            background: #fdf0ef;
            border: 1px solid #f5c6c3;
            border-left: 4px solid var(--error);
            color: var(--error);
            padding: 12px 14px;
            border-radius: var(--radio);
            font-size: .85rem;
            margin-bottom: 20px;
            animation: sacudir .4s ease;
        }
        .mensaje-error.visible { display: block; }
        @keyframes sacudir {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-6px); }
            40%,80% { transform: translateX(6px); }
        }

        /* Botón */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--azul-medio), var(--azul-acento));
            color: #fff;
            border: none;
            border-radius: var(--radio);
            font-size: .95rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 4px 16px rgba(0,51,102,.3);
            letter-spacing: .3px;
            position: relative;
            overflow: hidden;
        }
        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.1), transparent);
            opacity: 0;
            transition: opacity .2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,51,102,.4);
        }
        .btn-login:hover::after { opacity: 1; }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled {
            opacity: .7;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: girar .7s linear infinite;
            margin: 0 auto;
        }
        @keyframes girar { to { transform: rotate(360deg); } }
        .btn-login.cargando .texto-btn { display: none; }
        .btn-login.cargando .spinner { display: block; }

        /* Footer */
        .pie {
            text-align: center;
            margin-top: 28px;
            font-size: .78rem;
            color: #aab;
            line-height: 1.6;
        }
        .pie strong { color: var(--azul-medio); }

        @media (max-width: 480px) {
            .tarjeta { padding: 36px 28px; margin: 16px; }
        }
    </style>
</head>
<body>

<div class="decoracion decoracion-1"></div>
<div class="decoracion decoracion-2"></div>

<div class="tarjeta">
    <div class="logo-area">
        <div class="logo-icono">
            <svg viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
        </div>
        <h1>Sistema AIR</h1>
        <p class="subtitulo">Asamblea Institucional Representativa · TEC</p>
        <div class="separador"></div>
    </div>

    <div class="mensaje-error" id="error-msg">
        Usuario o contraseña incorrectos. Intente de nuevo.
    </div>

    <div class="grupo">
        <label for="username">Usuario</label>
        <div class="input-wrap">
            <input type="text" id="username" placeholder="Ingrese su usuario" autocomplete="username">
            <svg viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>
    </div>

    <div class="grupo">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
            <input type="password" id="password" placeholder="Ingrese su contraseña" autocomplete="current-password">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button class="toggle-pass" type="button" onclick="togglePass()" title="Mostrar/ocultar contraseña">
                <svg id="ojo-icon" viewBox="0 0 24 24" stroke="#aab" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="iniciarSesion()">
        <span class="texto-btn">Iniciar sesión</span>
        <div class="spinner"></div>
    </button>

    <div class="pie">
        <strong>Instituto Tecnológico de Costa Rica</strong><br>
        Gestión Legislativa Institucional
    </div>
</div>

<script>
    function togglePass() {
        const input = document.getElementById('password');
        const icono = document.getElementById('ojo-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icono.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            `;
        } else {
            input.type = 'password';
            icono.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            `;
        }
    }

    // Login con Enter
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') iniciarSesion();
    });
    document.getElementById('username').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('password').focus();
    });

    async function iniciarSesion() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('btn-login');
        const errorDiv = document.getElementById('error-msg');

        if (!username || !password) {
            mostrarError('Por favor complete todos los campos.');
            return;
        }

        // Estado cargando
        btn.classList.add('cargando');
        btn.disabled = true;
        errorDiv.classList.remove('visible');

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!res.ok) {
                mostrarError(data.error || 'Credenciales inválidas.');
                return;
            }

            // Guardar token y redirigir
            sessionStorage.setItem('token', data.token);

sessionStorage.setItem('usuario', JSON.stringify({
    username: data.username || username,
    roles: data.roles || []
}));

            window.location.href = '/index.html';

        } catch (err) {
            mostrarError('Error de conexión. Verifique que el servidor esté activo.');
        } finally {
            btn.classList.remove('cargando');
            btn.disabled = false;
        }
    }

    function mostrarError(msg) {
        const div = document.getElementById('error-msg');
        div.textContent = msg;
        div.classList.remove('visible');
        void div.offsetWidth; // fuerza re-render para animación
        div.classList.add('visible');
    }

</script>

</body>
</html>
