```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compilador Normativo — AIR</title>
    <style>
        /* ── Variables ── */
        :root {
            --color-primario   : #003366;
            --color-acento     : #005fa3;
            --color-peligro    : #c0392b;
            --color-exito      : #1e7e34;
            --color-advertencia: #856404;
            --bg-advertencia   : #fff3cd;
            --bg-peligro       : #f8d7da;
            --bg-exito         : #d4edda;
            --radio            : 6px;
            --sombra           : 0 2px 12px rgba(0,0,0,.12);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f4f6f9; 
            color: #222; 
            margin: 0; 
        }

        /* ── Layout ── */
        .page-header {
            background: var(--color-primario); 
            color: #fff;
            padding: 28px 28px 24px; 
            text-align: center;
        }
        .page-header h1 { 
            margin: 0 0 8px; 
            font-size: 1.8rem; 
            font-weight: 600; 
        }
        .page-header .subtitulo { 
            margin: 0; 
            font-size: .95rem; 
            opacity: .95; 
        }
        .page-header .badge-modulo {
            background: rgba(255,255,255,.18); 
            border-radius: 20px;
            padding: 4px 14px; 
            font-size: .8rem; 
            letter-spacing: .4px;
            display: inline-block;
            margin-top: 12px;
        }
        
        .contenedor { 
            max-width: 1100px; 
            margin: 28px auto; 
            padding: 0 20px; 
        }

        /* ── Formularios y Selects ── */
        .campo {
            background: #fff;
            border-radius: var(--radio);
            padding: 24px;
            box-shadow: var(--sombra);
            border: 1px solid rgba(0,0,0,.05);
            margin-bottom: 24px;
        }
        .campo label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--color-primario);
            font-size: .95rem;
        }
        .campo select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: var(--radio);
            font-size: 1rem;
            background: #fff;
            transition: all .15s;
            font-family: inherit;
        }
        .campo select:focus {
            outline: none;
            border-color: var(--color-acento);
            box-shadow: 0 0 0 3px rgba(0,95,163,.1);
        }

        /* ── Layout Split ── */
        .layout-split {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            margin-top: 24px;
        }

        /* ── Árbol Normativo ── */
        .seccion-arbol {
            background: #fff;
            border-radius: var(--radio);
            padding: 24px;
            box-shadow: var(--sombra);
            border: 1px solid rgba(0,0,0,.05);
            height: 70vh;
            overflow-y: auto;
        }
        .seccion-arbol h3 {
            margin: 0 0 20px;
            font-size: 1.15rem;
            color: var(--color-primario);
            font-weight: 600;
        }
        .arbol { 
            list-style: none; 
            padding-left: 0; 
            margin: 0;
        }
        .arbol ul { 
            list-style: none; 
            padding-left: 24px; 
            border-left: 2px solid #e1e5e9; 
            margin: 8px 0 0 4px; 
        }
        .nodo { 
            display: block;
            padding: 8px 12px; 
            cursor: pointer; 
            border-radius: var(--radio); 
            margin: 2px 0; 
            transition: all .15s;
            font-size: .92rem;
        }
        .nodo:hover { 
            background: rgba(0,95,163,.08); 
        }
        .nodo.seleccionado { 
            background: var(--color-acento); 
            color: #fff; 
            font-weight: 600;
        }
        .nivel-Título    { color: var(--color-primario); font-weight: 600; font-size: 1rem; }
        .nivel-Capítulo  { color: var(--color-acento); font-weight: 600; }
        .nivel-Artículo  { color: #333; }
        .nivel-Inciso    { color: #555; font-size: .92rem; }
        .nivel-Sub-inciso { color: #666; font-size: .88rem; }

        /* ── Visor de Contenido ── */
        .visor {
            background: #fff;
            border-radius: var(--radio);
            padding: 24px;
            box-shadow: var(--sombra);

            min-height: 400px;
            display: flex;
            flex-direction: column;

        .visor-placeholder {
            color: #888;
            text-align: center;
            padding: 40px 20px;

        .badge-vigente {

            border-radius: 20px;
            font-size: .8rem;

        }
        .trazabilidad strong {
            color: var(--color-primario);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px; 
            border-radius: var(--radio); 
            border: none; 
            cursor: pointer; 
            font-size: .9rem; 
            font-weight: 600; 
            text-decoration: none;
            transition: all .15s;
            background: var(--color-acento);
            color: #fff;
        }
        .btn:hover { 
            opacity: .9;
            transform: translateY(-1px);
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: .85rem;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 24px 0;
            color: #666;
            font-size: .88rem;
            border-top: 1px solid #e9ecef;
            margin-top: 44px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .layout-split {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .seccion-arbol, .visor {
                height: 50vh;
            }
            .contenedor { padding: 0 16px; }
            .page-header { padding: 24px 20px 20px; }
            .page-header h1 { font-size: 1.5rem; }
            .campo, .seccion-arbol, .visor { padding: 20px; }
            .arbol ul { padding-left: 16px; }
        }
    </style>
</head>
<body>

<!-- ── Encabezado ── -->
<header class="page-header">
    <h1>Compilador Normativo</h1>
    <p class="subtitulo">Explorador interactivo de estructura normativa y visor de contenido vigente</p>
    <span class="badge-modulo">Normativa</span>
</header>

<main class="contenedor">
    <div class="campo">
        <label>Seleccionar reglamento</label>
        <select id="selector-reglamento" onchange="cargarArbol(this.value)">
            <option value="">Seleccione un reglamento...</option>
        </select>
    </div>

    <div class="layout-split" id="panel-arbol" style="display:none">
        <!-- Árbol jerárquico -->
        <div class="seccion-arbol">
            <h3>Estructura normativa</h3>
            <ul class="arbol" id="contenedor-arbol"></ul>
        </div>

        <!-- Visor del artículo seleccionado -->
        <div>
            <div class="visor" id="visor-contenido">
                <div class="visor-placeholder">Seleccione un elemento del árbol para ver su contenido.</div>
            </div>
        </div>
    </div>

    <div class="footer">
        Compilador Normativo — Sistema AIR
    </div>
</main>

<script>
    const token = localStorage.getItem('token');
    let arbolPlano = [];

    async function cargarReglamentos() {
        const res  = await fetch('/normativa', { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        data.forEach(r => {
            document.getElementById('selector-reglamento').add(
                new Option(`${r.sigla} — ${r.nombre_normativa}`, r.id_reglamento)
            );
        });
    }

    async function cargarArbol(id_reglamento) {
        if (!id_reglamento) return;
        document.getElementById('panel-arbol').style.display = 'none';

        const res  = await fetch(`/normativa/${id_reglamento}/arbol`,
            { headers: { Authorization: `Bearer ${token}` } });
        arbolPlano = await res.json();

        renderArbol(arbolPlano);
        document.getElementById('panel-arbol').style.display = 'grid';
    }

    // Convierte la lista plana (con profundidad) en un árbol HTML
    function renderArbol(nodos) {
        const ul = document.getElementById('contenedor-arbol');
        ul.innerHTML = '';

        // Mapa de id -> elemento de lista
        const mapa = {};

        nodos.forEach(n => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span class="nodo nivel-${n.nivel}"
                      onclick="seleccionarNodo(${n.id_elemento}, this)"
                      data-id="${n.id_elemento}">
                    ${n.numer_etiqueta}
                </span>
            `;
            mapa[n.id_elemento] = li;

            if (!n.id_elemento_padre) {
                ul.appendChild(li);
            } else {
                const padre = mapa[n.id_elemento_padre];
                if (padre) {
                    let subUl = padre.querySelector('ul');
                    if (!subUl) { subUl = document.createElement('ul'); padre.appendChild(subUl); }
                    subUl.appendChild(li);
                }
            }
        });
    }

    async function seleccionarNodo(id_elemento, spanEl) {
        // Marca el nodo activo
        document.querySelectorAll('.nodo.seleccionado').forEach(n => n.classList.remove('seleccionado'));
        spanEl.classList.add('seleccionado');

        const nodo = arbolPlano.find(n => n.id_elemento === id_elemento);
        if (!nodo) return;

        // Carga historial para trazabilidad
        const histRes  = await fetch(`/normativa/elemento/${id_elemento}/historial`,
            { headers: { Authorization: `Bearer ${token}` } });
        const historial = await histRes.json();

        const anterior = historial.find(h => h.estado_vigencia === 'Histórico');

        document.getElementById('visor-contenido').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
                <h2 style="margin:0; color: var(--color-primario); font-size: 1.3rem;">${nodo.nivel} ${nodo.numer_etiqueta}</h2>
                <span class="badge-vigente">● Vigente</span>
            </div>

            <div style="flex: 1; line-height: 1.7; color: #333; font-size: 1rem;">${nodo.contenido_texto}</div>

            <div class="trazabilidad">
                <strong>Trazabilidad y versión</strong><br>
                Vigente desde: ${nodo.fecha_inicio_vigencia
                    ? new Date(nodo.fecha_inicio_vigencia).toLocaleDateString('es-CR')
                    : 'Fecha de creación del reglamento'}
                ${anterior ? `<br><em>Versión anterior existente — Última modificación el
                    ${new Date(anterior.fecha_fin_vigencia).toLocaleDateString('es-CR')}</em>` : ''}
                ${historial[0]?.acuerdo_origen
                    ? `<br>Resolución de origen: <strong>${historial[0].acuerdo_origen}</strong>` : ''}
            </div>

            <div style="margin-top:24px">
                <button class="btn btn-sm"
                        onclick="window.location.href='/propuestas/nueva?elemento=${id_elemento}'">
                    + Proponer reforma a este elemento
                </button>
            </div>
        `;
        document.querySelector('.visor-placeholder')?.remove();
    }

    cargarReglamentos();
</script>

</body>
</html>
