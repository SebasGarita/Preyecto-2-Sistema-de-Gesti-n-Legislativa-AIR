<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compilador Normativo — AIR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css">
    <style>
        :root {
            --color-primario   : #003366;
            --color-acento     : #005fa3;
            --color-peligro    : #c0392b;
            --color-exito      : #1e7e34;
            --color-advertencia: #856404;
            --bg-advertencia   : #fff3cd;
            --bg-peligro       : #f8d7da;
            --bg-exito         : #d4edda;
            --radio            : 6px;
            --sombra           : 0 2px 12px rgba(0,0,0,.12);
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #222; margin: 0; }

        .page-header { background: var(--color-primario); color: #fff; padding: 28px 28px 24px; text-align: center; }
        .page-header h1 { margin: 0 0 8px; font-size: 1.8rem; font-weight: 600; }
        .page-header .subtitulo { margin: 0; font-size: .95rem; opacity: .95; }
        .page-header .badge-modulo {
            background: rgba(255,255,255,.18); border-radius: 20px;
            padding: 4px 14px; font-size: .8rem; letter-spacing: .4px;
            display: inline-block; margin-top: 12px;
        }

        .contenedor { max-width: 1100px; margin: 28px auto; padding: 0 20px; }

        .campo {
            background: #fff; border-radius: var(--radio); padding: 24px;
            box-shadow: var(--sombra); border: 1px solid rgba(0,0,0,.05); margin-bottom: 24px;
        }
        .campo label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--color-primario); font-size: .95rem; }
        .campo select {
            width: 100%; padding: 12px 16px; border: 2px solid #e1e5e9;
            border-radius: var(--radio); font-size: 1rem; background: #fff;
            transition: all .15s; font-family: inherit;
        }
        .campo select:focus { outline: none; border-color: var(--color-acento); box-shadow: 0 0 0 3px rgba(0,95,163,.1); }

        .layout-split { display: grid; grid-template-columns: 320px 1fr; gap: 24px; margin-top: 24px; }

        .seccion-arbol {
            background: #fff; border-radius: var(--radio); padding: 24px;
            box-shadow: var(--sombra); border: 1px solid rgba(0,0,0,.05);
            height: 70vh; overflow-y: auto;
        }
        .seccion-arbol h3 { margin: 0 0 20px; font-size: 1.15rem; color: var(--color-primario); font-weight: 600; }
        .arbol { list-style: none; padding-left: 0; margin: 0; }
        .arbol ul { list-style: none; padding-left: 24px; border-left: 2px solid #e1e5e9; margin: 8px 0 0 4px; }
        .nodo {
            display: block; padding: 8px 12px; cursor: pointer;
            border-radius: var(--radio); margin: 2px 0; transition: all .15s; font-size: .92rem;
        }
        .nodo:hover { background: rgba(0,95,163,.08); }
        .nodo.seleccionado { background: var(--color-acento); color: #fff; font-weight: 600; }
        .nivel-Título     { color: var(--color-primario); font-weight: 600; font-size: 1rem; }
        .nivel-Capítulo   { color: var(--color-acento); font-weight: 600; }
        .nivel-Artículo   { color: #333; }
        .nivel-Inciso     { color: #555; font-size: .92rem; }
        .nivel-Sub-inciso { color: #666; font-size: .88rem; }

        .visor {
            background: #fff; border-radius: var(--radio); padding: 24px;
            box-shadow: var(--sombra); border: 1px solid rgba(0,0,0,.05);
            min-height: 400px; display: flex; flex-direction: column;
        }
        .visor-placeholder { color: #888; text-align: center; padding: 40px 20px; font-style: italic; }

        .badge-vigente {
            background: var(--bg-exito); color: var(--color-exito);
            padding: 4px 12px; border-radius: 20px; font-size: .8rem; font-weight: 600;
        }

        .trazabilidad {
            background: var(--bg-advertencia); border-left: 4px solid var(--color-advertencia);
            padding: 16px; margin-top: 20px; border-radius: 0 var(--radio) var(--radio) 0; font-size: .9rem;
        }
        .trazabilidad strong { color: var(--color-primario); }

        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: var(--radio); border: none;
            cursor: pointer; font-size: .9rem; font-weight: 600;
            transition: all .15s; background: var(--color-acento); color: #fff;
        }
        .btn:hover { opacity: .9; transform: translateY(-1px); }
        .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
        .btn-sm         { padding: 8px 16px; font-size: .85rem; }
        .btn-secundario { background: #6c757d; }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.55); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.activo { display: flex; }
        .modal {
            background: #fff; border-radius: 10px;
            box-shadow: 0 8px 40px rgba(0,0,0,.25);
            width: 700px; max-width: 95vw; max-height: 90vh;
            overflow-y: auto; padding: 32px; position: relative;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #e9ecef;
        }
        .modal-header h2 { margin: 0; color: var(--color-primario); font-size: 1.25rem; }
        .modal-cerrar {
            background: none; border: none; font-size: 1.5rem;
            cursor: pointer; color: #666; line-height: 1; padding: 4px 8px;
            border-radius: 4px; transition: background .15s;
        }
        .modal-cerrar:hover { background: #f0f0f0; color: #333; }

        .form-grupo { margin-bottom: 20px; }
        .form-grupo label { display: block; margin-bottom: 6px; font-weight: 600; color: #444; font-size: .9rem; }
        .form-grupo input,
        .form-grupo textarea,
        .form-grupo select {
            width: 100%; padding: 10px 14px; border: 2px solid #e1e5e9;
            border-radius: var(--radio); font-size: .95rem; font-family: inherit;
            transition: border-color .15s; box-sizing: border-box;
        }
        .form-grupo input:focus,
        .form-grupo textarea:focus,
        .form-grupo select:focus {
            outline: none; border-color: var(--color-acento);
            box-shadow: 0 0 0 3px rgba(0,95,163,.1);
        }
        .form-grupo textarea { resize: vertical; min-height: 120px; }

        .texto-referencia {
            background: #f8f9fa; border: 1px solid #dee2e6; border-radius: var(--radio);
            padding: 12px 16px; font-size: .9rem; color: #555; line-height: 1.6;
            max-height: 120px; overflow-y: auto; font-style: italic;
        }

        .modal-footer {
            display: flex; gap: 12px; justify-content: flex-end;
            margin-top: 28px; padding-top: 20px; border-top: 1px solid #e9ecef;
        }

        .alerta {
            padding: 12px 16px; border-radius: var(--radio);
            font-size: .9rem; margin-bottom: 16px; display: none;
        }
        .alerta-error { background: var(--bg-peligro); color: var(--color-peligro); border-left: 4px solid var(--color-peligro); }
        .alerta-exito { background: var(--bg-exito);   color: var(--color-exito);   border-left: 4px solid var(--color-exito); }

        /* ── Tom Select overrides ── */
        .ts-wrapper { font-family: 'Segoe UI', sans-serif; }
        .ts-control {
            border: 2px solid #e1e5e9 !important; border-radius: var(--radio) !important;
            font-size: .95rem !important; min-height: 44px !important; padding: 4px 8px !important;
        }
        .ts-control:focus-within {
            border-color: var(--color-acento) !important;
            box-shadow: 0 0 0 3px rgba(0,95,163,.1) !important;
        }
        .ts-control .item {
            background: #d0e8ff !important; color: #003f8a !important;
            border-radius: 20px !important; padding: 2px 10px !important;
            font-size: .82rem !important; font-weight: 600 !important;
        }
        .ts-dropdown { border-radius: var(--radio) !important; font-size: .9rem !important; }
        .ts-dropdown .option.selected,
        .ts-dropdown .option:hover { background: var(--color-acento) !important; color: #fff !important; }

        .footer {
            text-align: center; padding: 24px 0; color: #666;
            font-size: .88rem; border-top: 1px solid #e9ecef; margin-top: 44px;
        }

        @media (max-width: 768px) {
            .layout-split { grid-template-columns: 1fr; gap: 20px; }
            .seccion-arbol, .visor { height: 50vh; }
            .contenedor { padding: 0 16px; }
            .modal { padding: 24px 20px; }
        }
    </style>
</head>
<body>

<header class="page-header">
    <h1>Compilador Normativo</h1>
    <p class="subtitulo">Explorador interactivo de estructura normativa y visor de contenido vigente</p>
    <span class="badge-modulo">Normativa</span>
</header>

<main class="contenedor">
    <div class="campo">
        <label>Seleccionar reglamento</label>
        <select id="selector-reglamento" onchange="cargarArbol(this.value)">
            <option value="">Seleccione un reglamento...</option>
        </select>
    </div>

    <div class="layout-split" id="panel-arbol" style="display:none">
        <div class="seccion-arbol">
            <h3>Estructura normativa</h3>
            <ul class="arbol" id="contenedor-arbol"></ul>
        </div>
        <div>
            <div class="visor" id="visor-contenido">
                <div class="visor-placeholder">Seleccione un elemento del árbol para ver su contenido.</div>
            </div>
        </div>
    </div>

    <div class="footer">Compilador Normativo — Sistema AIR</div>
</main>

<!-- ── Modal Proponer Reforma ── -->
<div class="modal-overlay" id="modal-reforma">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
        <div class="modal-header">
            <h2 id="modal-titulo">Proponer reforma normativa</h2>
            <button class="modal-cerrar" onclick="cerrarModal()" aria-label="Cerrar">&times;</button>
        </div>

        <div class="alerta alerta-error" id="alerta-error"></div>
        <div class="alerta alerta-exito" id="alerta-exito"></div>

        <div class="form-grupo">
            <label>Elemento a reformar</label>
            <input type="text" id="ref-elemento" readonly style="background:#f8f9fa;color:#555;">
        </div>

        <div class="form-grupo">
            <label>Texto vigente actual</label>
            <div class="texto-referencia" id="ref-texto-actual"></div>
        </div>

        <div class="form-grupo">
            <label for="reforma-titulo">Título de la propuesta <span style="color:var(--color-peligro)">*</span></label>
            <input type="text" id="reforma-titulo" placeholder="Ej: Reforma al Artículo 5 sobre autonomía universitaria">
        </div>

        <div class="form-grupo">
            <label for="reforma-codigo">Código AIR (opcional)</label>
            <input type="text" id="reforma-codigo" placeholder="Ej: AIR-99-2025">
        </div>

        <div class="form-grupo">
            <label for="reforma-texto">Texto sustitutivo propuesto <span style="color:var(--color-peligro)">*</span></label>
            <textarea id="reforma-texto" placeholder="Escriba aquí el nuevo texto que sustituiría al elemento vigente..."></textarea>
        </div>

        <div class="form-grupo">
            <label for="reforma-etapa">Etapa de la propuesta <span style="color:var(--color-peligro)">*</span></label>
            <select id="reforma-etapa">
                <option value="">Cargando etapas...</option>
            </select>
        </div>

        <div class="form-grupo">
            <label for="reforma-mayoria">Tipo de mayoría requerida <span style="color:var(--color-peligro)">*</span></label>
            <select id="reforma-mayoria">
                <option value="">Cargando...</option>
            </select>
        </div>

        <!-- ── NUEVO: Proponentes ── -->
        <div class="form-grupo">
            <label for="reforma-proponentes">
                Proponentes <span style="color:var(--color-peligro)">*</span>
                <span style="font-weight:400;color:#888;font-size:.8rem"> — mínimo uno</span>
            </label>
            <select id="reforma-proponentes" multiple placeholder="Buscar asambleísta por nombre o cédula..."></select>
        </div>

        <div class="modal-footer">
            <button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
            <button class="btn" id="btn-guardar-reforma" onclick="guardarReforma()">
                Registrar propuesta
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script src="/shared/auth.js"></script>
<script>
    let arbolPlano    = [];
    let nodoActual    = null;
    let catalogos     = null;
    let tsProponentes = null;   // instancia Tom Select

    // ── Init ──────────────────────────────────────────────────────
    async function init() {
        await Promise.all([
            cargarReglamentos(),
            cargarCatalogos(),
            cargarAsambleistas()
        ]);
    }

    // ── Reglamentos ───────────────────────────────────────────────
    async function cargarReglamentos() {
        try {
            const res  = await fetch('/normativa');
            if (!res.ok) return;
            const data = await res.json();
            const sel  = document.getElementById('selector-reglamento');
            sel.innerHTML = '<option value="">Seleccione un reglamento...</option>';
            data.forEach(r => sel.add(new Option(`${r.sigla} — ${r.nombre_normativa}`, r.id_reglamento)));
        } catch (err) { console.error('Error reglamentos:', err); }
    }

    // ── Catálogos (etapas, mayorías) ──────────────────────────────
    async function cargarCatalogos() {
        try {
            const res = await fetch('/propuestas/catalogos');
            if (!res.ok) return;
            catalogos = await res.json();

            const selEtapa = document.getElementById('reforma-etapa');
            selEtapa.innerHTML = '<option value="">Seleccione etapa...</option>';
            catalogos.etapas.forEach(e =>
                selEtapa.add(new Option(e.nombre, e.id_etapa_propuesta))
            );

            const selMayoria = document.getElementById('reforma-mayoria');
            selMayoria.innerHTML = '<option value="">Seleccione mayoría...</option>';
            catalogos.mayorias.forEach(m =>
                selMayoria.add(new Option(m.nombre_rol, m.id_tipo_mayoria_requerida))
            );
        } catch (err) { console.error('Error catálogos:', err); }
    }

    // ── Asambleístas → Tom Select ─────────────────────────────────
    async function cargarAsambleistas() {
        try {
            const res  = await fetch('/asambleistas');
            if (!res.ok) return;
            const data = await res.json();

            const opciones = data.map(a => ({
                value: String(a.asambleista_id),
                text:  `${a.nombre} (${a.cedula})`
            }));

            tsProponentes = new TomSelect('#reforma-proponentes', {
                options:    opciones,
                plugins:    ['remove_button'],
                maxOptions: 400,
                placeholder: 'Buscar asambleísta por nombre o cédula...'
            });
        } catch (err) { console.error('Error asambleístas:', err); }
    }

    // ── Árbol ─────────────────────────────────────────────────────
    async function cargarArbol(id_reglamento) {
        if (!id_reglamento) return;
        document.getElementById('panel-arbol').style.display = 'none';
        const res  = await fetch(`/normativa/${id_reglamento}/arbol`);
        arbolPlano = await res.json();
        renderArbol(arbolPlano);
        document.getElementById('panel-arbol').style.display = 'grid';
    }

    function renderArbol(nodos) {
        const ul = document.getElementById('contenedor-arbol');
        ul.innerHTML = '';
        const mapa = {};

        nodos.forEach(n => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span class="nodo nivel-${n.nivel}"
                      onclick="seleccionarNodo('${n.id_elemento}', this)"
                      data-id="${n.id_elemento}">
                    ${n.numer_etiqueta}
                </span>`;
            mapa[n.id_elemento] = li;
        });

        nodos.forEach(n => {
            const li = mapa[n.id_elemento];
            if (!n.id_elemento_padre) {
                ul.appendChild(li);
            } else {
                const padre = mapa[n.id_elemento_padre];
                if (padre) {
                    let subUl = padre.querySelector('ul');
                    if (!subUl) { subUl = document.createElement('ul'); padre.appendChild(subUl); }
                    subUl.appendChild(li);
                }
            }
        });
    }

    // ── Seleccionar nodo ──────────────────────────────────────────
    async function seleccionarNodo(id_elemento, spanEl) {
        document.querySelectorAll('.nodo.seleccionado').forEach(n => n.classList.remove('seleccionado'));
        spanEl.classList.add('seleccionado');

        nodoActual = arbolPlano.find(n => String(n.id_elemento) === String(id_elemento));
        if (!nodoActual) return;

        const histRes   = await fetch(`/normativa/elemento/${id_elemento}/historial`);
        const historial = await histRes.json();
        const anterior  = historial.find(h => h.estado_vigencia === 'Histórico');

        document.getElementById('visor-contenido').innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <h2 style="margin:0;color:var(--color-primario);font-size:1.3rem;">
                    ${nodoActual.nivel} ${nodoActual.numer_etiqueta}
                </h2>
                <span class="badge-vigente">● Vigente</span>
            </div>
            <div style="flex:1;line-height:1.7;color:#333;font-size:1rem;">
                ${nodoActual.contenido_texto}
            </div>
            <div class="trazabilidad">
                <strong>Trazabilidad y versión</strong><br>
                Vigente desde: ${nodoActual.fecha_inicio_vigencia
                    ? new Date(nodoActual.fecha_inicio_vigencia).toLocaleDateString('es-CR')
                    : 'Fecha de creación del reglamento'}
                ${anterior ? `<br><em>Versión anterior existente — Última modificación el
                    ${new Date(anterior.fecha_fin_vigencia).toLocaleDateString('es-CR')}</em>` : ''}
                ${historial[0]?.acuerdo_origen
                    ? `<br>Resolución de origen: <strong>${historial[0].acuerdo_origen}</strong>` : ''}
            </div>
            <div style="margin-top:24px">
                <button class="btn btn-sm" onclick="abrirModalReforma()">
                    + Proponer reforma a este elemento
                </button>
            </div>
        `;
    }

    // ── Modal ─────────────────────────────────────────────────────
    function abrirModalReforma() {
        if (!nodoActual) return;

        // Limpiar campos
        document.getElementById('reforma-titulo').value  = '';
        document.getElementById('reforma-codigo').value  = '';
        document.getElementById('reforma-texto').value   = '';
        document.getElementById('reforma-etapa').value   = '';
        document.getElementById('reforma-mayoria').value = '';
        if (tsProponentes) tsProponentes.clear();
        ocultarAlertas();

        // Poblar referencia
        document.getElementById('ref-elemento').value =
            `${nodoActual.nivel} ${nodoActual.numer_etiqueta}`;
        document.getElementById('ref-texto-actual').textContent =
            nodoActual.contenido_texto;

        document.getElementById('modal-reforma').classList.add('activo');
        document.getElementById('reforma-titulo').focus();
    }

    function cerrarModal() {
        document.getElementById('modal-reforma').classList.remove('activo');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });
    document.getElementById('modal-reforma').addEventListener('click', function(e) {
        if (e.target === this) cerrarModal();
    });

    // ── Guardar reforma ───────────────────────────────────────────
    async function guardarReforma() {
        ocultarAlertas();

        const titulo      = document.getElementById('reforma-titulo').value.trim();
        const codigo      = document.getElementById('reforma-codigo').value.trim();
        const texto       = document.getElementById('reforma-texto').value.trim();
        const etapa       = document.getElementById('reforma-etapa').value;
        const mayoria     = document.getElementById('reforma-mayoria').value;
        const proponentes = tsProponentes ? tsProponentes.getValue() : [];

        if (!titulo)           return mostrarError('El título de la propuesta es obligatorio.');
        if (!texto)            return mostrarError('El texto sustitutivo propuesto es obligatorio.');
        if (!etapa)            return mostrarError('Debe seleccionar la etapa de la propuesta.');
        if (!mayoria)          return mostrarError('Debe seleccionar el tipo de mayoría requerida.');
        if (!proponentes.length) return mostrarError('Debe agregar al menos un proponente.');

        const btn = document.getElementById('btn-guardar-reforma');
        btn.disabled    = true;
        btn.textContent = 'Guardando...';

        try {
            const idEstadoInicial = catalogos?.estados?.[0]?.id_estado_propuesta || null;

            const res = await fetch('/propuestas', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    titulo,
                    texto_sustitutivo:         texto,
                    codigo_air:                codigo || null,
                    id_etapa_propuesta:        etapa,
                    id_estado_propuesta:       idEstadoInicial,
                    id_tipo_mayoria_requerida: mayoria,
                    id_reglamento_base:        nodoActual.id_reglamento,
                    id_elemento_origen:        nodoActual.id_elemento,
                    proponentes                          // ← array de ids
                })
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error || 'Error al guardar la propuesta');
            }

            mostrarExito('Propuesta registrada correctamente. Puede gestionarla en el módulo de Propuestas.');
            btn.textContent = 'Registrar propuesta';
            btn.disabled    = false;
            setTimeout(() => cerrarModal(), 2200);

        } catch (err) {
            mostrarError(err.message);
            btn.textContent = 'Registrar propuesta';
            btn.disabled    = false;
        }
    }

    // ── Helpers UI ────────────────────────────────────────────────
    function mostrarError(msg) {
        const el = document.getElementById('alerta-error');
        el.textContent = msg; el.style.display = 'block';
    }
    function mostrarExito(msg) {
        const el = document.getElementById('alerta-exito');
        el.textContent = msg; el.style.display = 'block';
    }
    function ocultarAlertas() {
        document.getElementById('alerta-error').style.display = 'none';
        document.getElementById('alerta-exito').style.display = 'none';
    }

    init();
</script>
</body>
</html>
