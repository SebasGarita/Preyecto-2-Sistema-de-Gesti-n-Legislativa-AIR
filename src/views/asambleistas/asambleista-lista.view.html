<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Asambleístas — AIR</title>
  <style>
    /* ── Variables ── */
    :root {
      --color-primario   : #003366;
      --color-acento     : #005fa3;
      --color-peligro    : #c0392b;
      --color-exito      : #1e7e34;
      --color-advertencia: #856404;
      --bg-advertencia   : #fff3cd;
      --bg-peligro       : #f8d7da;
      --bg-exito         : #d4edda;
      --radio            : 6px;
      --sombra           : 0 2px 12px rgba(0,0,0,.12);
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #222;
      margin: 0;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--color-primario);
      color: #fff;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      font-size: .88rem;
      font-weight: 500;
      letter-spacing: .2px;
    }
    .navbar #usuario-actual {
      font-size: .82rem;
      opacity: .85;
    }

    /* ── Page Header ── */
    .page-header {
      background: var(--color-primario);
      color: #fff;
      padding: 28px 28px 24px;
      text-align: center;
    }
    .page-header h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      font-weight: 600;
    }
    .page-header .subtitulo {
      margin: 0;
      font-size: .95rem;
      opacity: .95;
    }
    .page-header .badge-modulo {
      background: rgba(255,255,255,.18);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: .8rem;
      letter-spacing: .4px;
      display: inline-block;
      margin-top: 12px;
    }

    /* ── Layout ── */
    .contenedor {
      max-width: 1100px;
      margin: 28px auto;
      padding: 0 20px;
    }

    /* ── Toolbar (search + action) ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .barra-busqueda {
      flex: 1;
      min-width: 220px;
      max-width: 420px;
    }
    .barra-busqueda input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d0d7de;
      border-radius: var(--radio);
      font-size: .92rem;
      font-family: inherit;
      background: #fff;
      box-shadow: var(--sombra);
      box-sizing: border-box;
      transition: border-color .15s;
      outline: none;
    }
    .barra-busqueda input:focus {
      border-color: var(--color-acento);
      box-shadow: 0 0 0 3px rgba(0,95,163,.12);
    }
    .barra-busqueda input::placeholder {
      color: #aaa;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radio);
      border: none;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn:hover {
      opacity: .9;
      transform: translateY(-1px);
    }
    .btn-primario {
      background: var(--color-acento);
      color: #fff;
    }
    .btn-sm {
      padding: 6px 14px;
      font-size: .82rem;
      background: var(--color-acento);
      color: #fff;
    }

    /* ── Card wrapper for table ── */
    .card {
      background: #fff;
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      border: 1px solid rgba(0,0,0,.05);
      overflow: hidden;
    }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .92rem;
    }
    thead {
      background: var(--color-primario);
      color: #fff;
    }
    thead th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: .85rem;
      letter-spacing: .3px;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #eef0f3;
      transition: background .12s;
    }
    tbody tr:last-child {
      border-bottom: none;
    }
    tbody tr:hover {
      background: #f0f4f9;
    }
    tbody td {
      padding: 12px 16px;
      color: #333;
      vertical-align: middle;
    }
    tbody td em {
      color: #aaa;
      font-style: italic;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .3px;
    }
    .badge-verde {
      background: var(--bg-exito);
      color: var(--color-exito);
    }
    .badge-gris {
      background: #e9ecef;
      color: #555;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 24px 0;
      color: #666;
      font-size: .88rem;
      border-top: 1px solid #e9ecef;
      margin-top: 44px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .contenedor { padding: 0 16px; }
      .page-header { padding: 24px 20px 20px; }
      .page-header h1 { font-size: 1.5rem; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .barra-busqueda { max-width: 100%; }
      table { font-size: .82rem; }
      thead th, tbody td { padding: 10px 12px; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <span>AIR – Sistema de Gestión Normativa</span>
    <span id="usuario-actual"></span>
  </nav>

  <!-- ── Encabezado ── -->
  <header class="page-header">
    <h1>Gestión de Asambleístas</h1>
    <p class="subtitulo">Lista completa de asambleístas, búsqueda por nombre o cédula y acceso a detalles</p>
    <span class="badge-modulo">Asambleístas</span>
  </header>

  <main class="contenedor">

    <!-- ── Toolbar ── -->
    <div class="toolbar">
      <div class="barra-busqueda">
        <input type="text" id="input-busqueda"
               placeholder="Buscar por nombre o cédula..."
               oninput="buscar(this.value)">
      </div>
      <a href="/src/views/asambleistas/asambleista-registro.view.html" class="btn btn-primario">Agregar Nuevo asambleísta</a>
    </div>

    <!-- ── Tabla ── -->
    <div class="card">
      <table id="tabla-asambleistas">
        <thead>
          <tr>
            <th>Nombre completo</th>
            <th>Cédula</th>
            <th>Sector actual</th>
            <th>Desde</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="cuerpo-tabla">
          <tr><td colspan="6" style="text-align:center;color:#aaa;padding:28px 16px;">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="footer">
      Módulo de administración de asambleístas — AIR
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');

    async function cargarLista(busqueda = '') {
      const url = `/asambleistas${busqueda ? '?busqueda=' + encodeURIComponent(busqueda) : ''}`;
      const res  = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      renderTabla(data);
    }

    function renderTabla(lista) {
      const tbody = document.getElementById('cuerpo-tabla');

      if (!lista.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:28px 16px;">No se encontraron resultados.</td></tr>';
        return;
      }

      tbody.innerHTML = lista.map(a => `
        <tr>
          <td>${a.nombre}</td>
          <td>${a.cedula}</td>
          <td>${a.sector_actual ?? '<em>Sin nombramiento</em>'}</td>
          <td>${a.fecha_inicio ? formatFecha(a.fecha_inicio) : '—'}</td>
          <td>
            <span class="badge ${a.estado === 'VIGENTE' ? 'badge-verde' : 'badge-gris'}">
              ${a.estado ?? 'Sin nombramiento'}
            </span>
          </td>
          <td>
            <a href="/asambleistas/${a.asambleista_id}" class="btn btn-sm">Ver</a>
          </td>
        </tr>
      `).join('');
    }

    function formatFecha(f) {
      return new Date(f).toLocaleDateString('es-CR');
    }

    let timer;
    function buscar(valor) {
      clearTimeout(timer);
      timer = setTimeout(() => cargarLista(valor), 300);
    }

    cargarLista();
  </script>
</body>
</html>
